# CodeBuild: build backend and produce zip for Elastic Beanstalk
version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g npm@latest
  pre_build:
    commands:
      - cd $CODEBUILD_SRC_DIR/backend
      - npm install
  build:
    commands:
      - cd $CODEBUILD_SRC_DIR/backend && npm run build
      - yum install -y zip || true
      - cd $CODEBUILD_SRC_DIR/backend && zip -r $CODEBUILD_SRC_DIR/backend-deploy.zip . -x "node_modules/*" -x ".env" -x ".git/*"
      - cd $CODEBUILD_SRC_DIR && mkdir -p deploy-output && unzip -o backend-deploy.zip -d deploy-output

artifacts:
  base-directory: deploy-output
  files:
    - '**/*'
  name: deploy-package
