# CodeBuild: build backend and produce zip for Elastic Beanstalk
version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install -g npm@latest
  pre_build:
    commands:
      - cd backend
      - npm install
  build:
    commands:
      - cd backend && npm run build
      - cd ..
      - yum install -y zip || true
      - cd backend && zip -r ../backend-deploy.zip . -x "node_modules/*" -x ".env" -x ".git/*" && cd ..

artifacts:
  files:
    - backend-deploy.zip
  name: deploy-package
