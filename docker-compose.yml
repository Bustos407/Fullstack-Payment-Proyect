services:
  postgres:
    image: postgres:16-alpine
    container_name: wompi-postgres
    environment:
      POSTGRES_USER: wompi
      POSTGRES_PASSWORD: wompi
      POSTGRES_DB: wompi_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

